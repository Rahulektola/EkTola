<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#dc2626">
    <title>Jeweller Management - ekTola Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Auth Service loaded via module -->
</head>
<body class="admin-layout">
    <!-- Navigation Sidebar -->
    <div id="admin-nav-container"></div>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Jeweller Management</h1>
        </header>

        <!-- Filter and Search Bar -->
        <div class="admin-controls">
            <div class="filter-tabs">
                <button class="filter-tab active" data-status="all">
                    All <span class="badge" id="badge-all">0</span>
                </button>
                <button class="filter-tab" data-status="PENDING">
                    Pending <span class="badge badge-warning" id="badge-pending">0</span>
                </button>
                <button class="filter-tab" data-status="APPROVED">
                    Approved <span class="badge badge-success" id="badge-approved">0</span>
                </button>
                <button class="filter-tab" data-status="REJECTED">
                    Rejected <span class="badge badge-error" id="badge-rejected">0</span>
                </button>
            </div>

            <div class="search-bar">
                <input 
                    type="text" 
                    id="search-input" 
                    class="form-input" 
                    placeholder="Search by business name, owner, or phone..."
                >
            </div>
        </div>

        <!-- Jewellers Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Business Name</th>
                        <th>Owner</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Contacts</th>
                        <th>Campaigns</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="jewellers-table">
                    <tr>
                        <td colspan="8" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination-container"></div>
    </main>

    <script type="module" src="/src/admin/jeweller-list.ts"></script>
</body>
</html>
