<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#dc2626">
    <title>Template Management - ekTola Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-layout">

    <!-- Navigation Sidebar -->
    <div id="admin-nav-container"></div>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Template Management</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="syncFromWhatsAppBtn">
                    🔄 Sync from WhatsApp
                </button>
                <button class="btn btn-admin" id="newTemplateBtn">
                    ➕ New Template
                </button>
            </div>
        </header>

        <!-- Filter Bar -->
        <div class="admin-controls">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">
                    All <span class="badge" id="badge-all">0</span>
                </button>
                <button class="filter-tab" data-filter="APPROVED">
                    Approved <span class="badge badge-success" id="badge-approved">0</span>
                </button>
                <button class="filter-tab" data-filter="PENDING">
                    Pending <span class="badge badge-warning" id="badge-pending">0</span>
                </button>
                <button class="filter-tab" data-filter="REJECTED">
                    Rejected <span class="badge badge-error" id="badge-rejected">0</span>
                </button>
            </div>
        </div>

        <!-- Templates Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Language</th>
                        <th>WhatsApp Status</th>
                        <th>Active</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="templates-table">
                    <tr>
                        <td colspan="7" class="text-center">Loading…</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination-container"></div>
    </main>

    <!-- ── New Template Modal (WIP) ── -->
    <div id="templateModal" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-container" style="max-width:400px;text-align:center;">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Template</h2>
                <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body" style="padding:40px 32px;">
                <div style="font-size:52px;margin-bottom:16px;">🚧</div>
                <h3 style="margin:0 0 10px;font-size:18px;font-weight:700;color:#1f2937;">Work in Progress</h3>
                <p style="margin:0;font-size:14px;color:#6b7280;line-height:1.6;">
                    Template creation will be available soon.<br>
                    Check back after the next update.
                </p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button class="btn btn-secondary" id="modalCancelBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- ── View / Status Modal ── -->
    <div id="statusModal" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">WhatsApp Status</h2>
                <button class="modal-close-btn" id="statusModalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body">
                <div id="statusModalContent" style="font-size:14px; line-height:1.8;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="statusModalDoneBtn">Done</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/admin/templates.ts"></script>
</body>
</html>
