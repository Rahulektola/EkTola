<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#dc2626">
    <title>Template Management - ekTola Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-layout">

    <!-- Navigation Sidebar -->
    <div id="admin-nav-container"></div>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Template Management</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="syncFromWhatsAppBtn">
                    🔄 Sync from WhatsApp
                </button>
                <button class="btn btn-admin" id="newTemplateBtn">
                    ➕ New Template
                </button>
            </div>
        </header>

        <!-- Filter Bar -->
        <div class="admin-controls">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">
                    All <span class="badge" id="badge-all">0</span>
                </button>
                <button class="filter-tab" data-filter="APPROVED">
                    Approved <span class="badge badge-success" id="badge-approved">0</span>
                </button>
                <button class="filter-tab" data-filter="PENDING">
                    Pending <span class="badge badge-warning" id="badge-pending">0</span>
                </button>
                <button class="filter-tab" data-filter="REJECTED">
                    Rejected <span class="badge badge-error" id="badge-rejected">0</span>
                </button>
            </div>
        </div>

        <!-- Templates Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Language</th>
                        <th>WhatsApp Status</th>
                        <th>Active</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="templates-table">
                    <tr>
                        <td colspan="7" class="text-center">Loading…</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination-container"></div>
    </main>

    <!-- ── New Template Modal (WIP) ── -->
    <div id="templateModal" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-container" style="max-width:400px;text-align:center;">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Template</h2>
                <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body" style="padding:40px 32px;">
                <div style="font-size:52px;margin-bottom:16px;">🚧</div>
                <h3 style="margin:0 0 10px;font-size:18px;font-weight:700;color:#1f2937;">Work in Progress</h3>
                <p style="margin:0;font-size:14px;color:#6b7280;line-height:1.6;">
                    Template creation will be available soon.<br>
                    Check back after the next update.
                </p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button class="btn btn-secondary" id="modalCancelBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- ── View / Status Modal ── -->
    <div id="statusModal" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">WhatsApp Status</h2>
                <button class="modal-close-btn" id="statusModalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body">
                <div id="statusModalContent" style="font-size:14px; line-height:1.8;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="statusModalDoneBtn">Done</button>
            </div>
        </div>
    </div>

    <!-- ── Template Preview Modal ── -->
    <div id="previewModal" class="modal-backdrop" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-container" style="max-width:620px;">
            <div class="modal-header">
                <h2 class="modal-title" id="previewModalTitle">Template Preview</h2>
                <button class="modal-close-btn" id="previewModalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body" id="previewModalBody">
                <!-- Filled by JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="previewModalDoneBtn">Close</button>
            </div>
        </div>
    </div>

    <style>
        /* WhatsApp-style message bubble for preview */
        .wa-bubble { background:#dcf8c6; border-radius:8px 8px 8px 0; padding:12px 16px; font-size:14px; line-height:1.6; color:#111827; margin-bottom:16px; white-space:pre-wrap; }
        .wa-bubble-header { font-weight:700; margin-bottom:6px; }
        .wa-bubble-footer { margin-top:8px; font-size:12px; color:#6b7280; font-style:italic; }
        .preview-detail { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f3f4f6; font-size:13px; }
        .preview-detail .lbl { color:#6b7280; font-weight:500; }
        .preview-detail .val { color:#111827; font-weight:600; }
        .preview-vars { margin-top:16px; background:#f9fafb; border-radius:8px; padding:12px 16px; }
        .preview-vars h4 { font-size:13px; font-weight:600; color:#6b7280; margin:0 0 8px; }
        .var-chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; background:#fff; border:1px solid #e5e7eb; border-radius:6px; font-size:12px; margin:2px 4px 2px 0; }
        .var-chip .vn { color:#6366f1; font-weight:600; }
        .var-chip .va { color:#9ca3af; }
        .var-chip .vv { color:#111827; }
        .lang-tabs { display:flex; gap:6px; margin-bottom:16px; }
        .lang-tab-btn { padding:4px 12px; border:1px solid #e5e7eb; border-radius:6px; background:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
        .lang-tab-btn.active { background:#6366f1; color:#fff; border-color:#6366f1; }
    </style>
            <div class="modal-body">
                <div id="statusModalContent" style="font-size:14px; line-height:1.8;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="statusModalDoneBtn">Done</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/admin/templates.ts"></script>
</body>
</html>
